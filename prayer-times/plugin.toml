id           = "yordle/prayer-times"
name         = "Prayer Times"
version      = "0.4.0"
min_noctalia = "5.0.0"
author       = "yordle"
license      = "MIT"
icon         = "building-mosque"
description  = "Next-prayer countdown on the bar that switches to an iqamah countdown at adhan, with notifications for both; the panel shows the Hijri date and the day's prayer table with iqamah times. Defaults to Doha, Qatar (AlAdhan API, cached daily)."
tags         = ["prayer", "islam", "adhan", "hijri", "qatar"]

# ---------------------------------------------------------------------------
# Plugin-level settings (Settings -> Plugins)
# ---------------------------------------------------------------------------
[[setting]]
key     = "city"
type    = "string"
label   = "City"
description = "City name passed to the AlAdhan API."
default = "Doha"

[[setting]]
key     = "country"
type    = "string"
label   = "Country"
description = "Country name passed to the AlAdhan API."
default = "Qatar"

[[setting]]
key     = "method"
type    = "int"
label   = "Calculation method (AlAdhan id)"
description = "10 = Qatar. Others: 4 = Umm Al-Qura, 3 = Muslim World League, 8 = Gulf Region — see aladhan.com/calculation-methods."
default = 10
min     = 0
max     = 23

[[setting]]
key     = "latitude"
type    = "string"
label   = "Latitude (fallback)"
description = "Used with the coordinates endpoint when the city lookup fails. Default: Doha."
default = "25.2854"

[[setting]]
key     = "longitude"
type    = "string"
label   = "Longitude (fallback)"
description = "Used with the coordinates endpoint when the city lookup fails. Default: Doha."
default = "51.5310"

[[setting]]
key     = "twelve_hour"
type    = "bool"
label   = "12-hour clock"
description = "Show times as 5:07 PM instead of 17:07."
default = true

# Per-prayer adhan correction in minutes (+/-), to align with a local
# timetable (e.g. QatarPrayer) when the API drifts by a few minutes.
# Applied live to the countdown, table, notifications and iqamah windows.
[[setting]]
key     = "tune_fajr"
type    = "int"
label   = "Adhan offset: Fajr (min)"
default = 0
min     = -30
max     = 30

[[setting]]
key     = "tune_sunrise"
type    = "int"
label   = "Adhan offset: Sunrise (min)"
default = 0
min     = -30
max     = 30

[[setting]]
key     = "tune_dhuhr"
type    = "int"
label   = "Adhan offset: Dhuhr (min)"
default = 0
min     = -30
max     = 30

[[setting]]
key     = "tune_asr"
type    = "int"
label   = "Adhan offset: Asr (min)"
default = 0
min     = -30
max     = 30

[[setting]]
key     = "tune_maghrib"
type    = "int"
label   = "Adhan offset: Maghrib (min)"
default = 0
min     = -30
max     = 30

[[setting]]
key     = "tune_isha"
type    = "int"
label   = "Adhan offset: Isha (min)"
default = 0
min     = -30
max     = 30

# Minutes from adhan to iqamah, per prayer (0 disables that prayer's window)
[[setting]]
key     = "iqamah_fajr"
type    = "int"
label   = "Iqamah after Fajr adhan (min)"
default = 25
min     = 0
max     = 60

[[setting]]
key     = "iqamah_dhuhr"
type    = "int"
label   = "Iqamah after Dhuhr adhan (min)"
default = 20
min     = 0
max     = 60

[[setting]]
key     = "iqamah_asr"
type    = "int"
label   = "Iqamah after Asr adhan (min)"
default = 25
min     = 0
max     = 60

[[setting]]
key     = "iqamah_maghrib"
type    = "int"
label   = "Iqamah after Maghrib adhan (min)"
default = 10
min     = 0
max     = 60

[[setting]]
key     = "iqamah_isha"
type    = "int"
label   = "Iqamah after Isha adhan (min)"
default = 20
min     = 0
max     = 60

# ---------------------------------------------------------------------------
# The GUI panel
# ---------------------------------------------------------------------------
[[panel]]
id        = "panel"
entry     = "panel.luau"
width     = 360
height    = 470
placement = "floating"
position  = "center"
open_near_click = true

# ---------------------------------------------------------------------------
# Bar widget
# ---------------------------------------------------------------------------
[[widget]]
id    = "bar"
entry = "widget.luau"

  [[widget.setting]]
  key     = "show_countdown"
  type    = "bool"
  label   = "Show countdown on bar"
  default = true

  [[widget.setting]]
  key     = "notify"
  type    = "bool"
  label   = "Notify at adhan and iqamah times"
  default = true

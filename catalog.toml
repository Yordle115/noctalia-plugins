[[plugin]]
id           = "yordle/music-yt"
name         = "Music (YouTube + Local)"
version      = "0.4.1"
author       = "yordle"
license      = "MIT"
icon         = "music"
description  = "Search YouTube and your local library, play or queue, favourites and playlists, with transport controls. Streams via yt-dlp + mpv — no Mopidy, no accounts."
deprecated   = false
min_noctalia = "5.0.0"
tags         = ["music", "youtube", "yt-dlp", "mpv"]

[[plugin]]
id           = "yordle/wallpaper-engine"
name         = "Wallpaper Engine"
version      = "0.3.0"
author       = "yordle"
license      = "MIT"
icon         = "photo"
description  = "Frontend for linux-wallpaperengine: browse Steam Workshop wallpapers with previews, assign per monitor (one process drives all monitors), and auto-pause via SIGSTOP (near-zero CPU/GPU) — on fullscreen by default, or when windows are open/focused. Restores wallpapers on login."
deprecated   = false
min_noctalia = "5.0.0"
tags         = ["wallpaper", "wallpaper-engine", "hyprland", "steam-workshop"]

[[plugin]]
id           = "yordle/prayer-times"
name         = "Prayer Times"
version      = "0.3.0"
author       = "yordle"
license      = "MIT"
icon         = "building-mosque"
description  = "Next-prayer countdown on the bar that switches to an iqamah countdown at adhan, with notifications for both; the panel shows the Hijri date and the day's prayer table with iqamah times. Defaults to Doha, Qatar (AlAdhan API, cached daily)."
deprecated   = false
min_noctalia = "5.0.0"
tags         = ["prayer", "islam", "adhan", "hijri", "qatar"]

[[plugin]]
id           = "yordle/todo"
name         = "To-Do"
version      = "0.1.1"
author       = "yordle"
license      = "MIT"
icon         = "checklist"
description  = "Simple persistent to-do list: panel with Active/Done tabs, pinning, a bar widget with the open-task count, and a /todo launcher command to add or complete tasks."
deprecated   = false
min_noctalia = "5.0.0"
tags         = ["todo", "tasks", "productivity"]

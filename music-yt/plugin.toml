id           = "yordle/music-yt"
name         = "Music (YTM + Local)"
version      = "0.1.0"
min_noctalia = "5.0.0"
author       = "yordle"
license      = "MIT"
icon         = "music"
description  = "Search YouTube Music and your local library, play or queue, manage playlists — driven through Mopidy via mpc."
tags         = ["music", "mpd", "mopidy", "ytmusic"]

# ---------------------------------------------------------------------------
# Plugin-level settings (shared by all entries, edited in Settings -> Plugins)
# ---------------------------------------------------------------------------
[[setting]]
key     = "mpc_host"
type    = "string"
label   = "MPD host"
description = "Host where Mopidy's MPD frontend listens."
default = "127.0.0.1"

[[setting]]
key     = "mpc_port"
type    = "int"
label   = "MPD port"
description = "Port of Mopidy's MPD frontend (matches services.mopidy [mpd] port)."
default = 6600
min     = 1
max     = 65535

[[setting]]
key     = "search_limit"
type    = "int"
label   = "Max results per source"
description = "How many results to show from each of YTM and local."
default = 8
min     = 3
max     = 25

[[setting]]
key     = "art_cache"
type    = "string"
label   = "Album art cache dir"
description = "Where downloaded thumbnails are cached."
default = "~/.cache/noctalia-music-yt"

# ---------------------------------------------------------------------------
# The GUI panel — now-playing header, search box, Queue/Playlists tabs
# ---------------------------------------------------------------------------
[[panel]]
id        = "panel"
entry     = "panel.luau"
width     = 480
height    = 620
placement = "floating"
position  = "center"
open_near_click = true

# ---------------------------------------------------------------------------
# Bar widget — click to toggle the panel, shows now-playing glyph/state
# ---------------------------------------------------------------------------
[[widget]]
id    = "bar"
entry = "widget.luau"

  [[widget.setting]]
  key     = "show_title"
  type    = "bool"
  label   = "Show track title on bar"
  default = true

  [[widget.setting]]
  key     = "max_title_len"
  type    = "int"
  label   = "Max title length on bar"
  default = 28
  min     = 6
  max     = 80

# ---------------------------------------------------------------------------
# Launcher provider — /music-yt fallback for quick search from the launcher
# ---------------------------------------------------------------------------
[[launcher_provider]]
id          = "search"
entry       = "search.luau"
prefix      = "/music-yt"
glyph       = "music"
debounce_ms = 350
include_in_global_search = false

id           = "yordle/music-yt"
name         = "Music (YouTube + Local)"
version      = "0.2.1"
min_noctalia = "5.0.0"
author       = "yordle"
license      = "MIT"
icon         = "music"
description  = "Search YouTube and your local library, play or queue, with transport controls. Streams via yt-dlp + mpv — no Mopidy, no accounts."
tags         = ["music", "youtube", "yt-dlp", "mpv"]

# ---------------------------------------------------------------------------
# Plugin-level settings (Settings -> Plugins)
# ---------------------------------------------------------------------------
[[setting]]
key     = "search_results"
type    = "int"
label   = "Search results"
description = "How many YouTube results to fetch per search."
default = 15
min     = 3
max     = 40

[[setting]]
key     = "yt_player_client"
type    = "string"
label   = "yt-dlp player client"
description = "YouTube extractor client (android is fast and reliable; web/tv are alternatives)."
default = "android"

[[setting]]
key     = "search_local"
type    = "bool"
label   = "Also search local library"
description = "Include results from your local music directory."
default = false

[[setting]]
key     = "local_music_dir"
type    = "string"
label   = "Local music directory"
description = "Folder to search when local search is enabled."
default = "~/Music"

# ---------------------------------------------------------------------------
# The GUI panel
# ---------------------------------------------------------------------------
[[panel]]
id        = "panel"
entry     = "panel.luau"
width     = 480
height    = 620
placement = "floating"
position  = "center"
open_near_click = true

# ---------------------------------------------------------------------------
# Bar widget
# ---------------------------------------------------------------------------
[[widget]]
id    = "bar"
entry = "widget.luau"

  [[widget.setting]]
  key     = "show_title"
  type    = "bool"
  label   = "Show track title on bar"
  default = true

  [[widget.setting]]
  key     = "max_title_len"
  type    = "int"
  label   = "Max title length on bar"
  default = 28
  min     = 6
  max     = 80

# ---------------------------------------------------------------------------
# Launcher provider — /music-yt quick search
# ---------------------------------------------------------------------------
[[launcher_provider]]
id          = "search"
entry       = "search.luau"
prefix      = "/music-yt"
glyph       = "music"
debounce_ms = 400
include_in_global_search = false
